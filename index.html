<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-468H30PJPD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-468H30PJPD');
</script>
<link rel="icon" type="image/png" href="/my-game-arcade/favicon.png">
<title>🖼️ Mockup Generator — Free Printable Art Previewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="bg-blob a"></div>
<div class="bg-blob b"></div>
<div class="bg-blob c"></div>

<div class="content">

  <h1>🖼️ Mockup Generator</h1>
  <p class="subtitle">See your printable art on real walls — to scale.</p>

  <!-- STEP 1: Upload -->
  <div class="section-label">📁 Upload Your Design</div>
  <div class="card">
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.svg" hidden>
      <div class="upload-content" id="uploadContent">
        <span class="upload-icon">📁</span>
        <p>Drag & drop or <span class="upload-link">browse</span></p>
        <p class="upload-hint">PNG, JPG, or SVG</p>
      </div>
      <img id="uploadPreview" class="upload-preview" alt="Preview">
    </div>
  </div>

  <!-- STEP 2: Paper Size -->
  <div class="section-label">📐 Paper Size</div>
  <div class="option-bar" id="sizeButtons">
    <button class="option-btn" data-size="A5" data-w="148" data-h="210">
      A5 <span class="option-sub">148×210</span>
    </button>
    <button class="option-btn active" data-size="A4" data-w="210" data-h="297">
      A4 <span class="option-sub">210×297</span>
    </button>
    <button class="option-btn" data-size="A3" data-w="297" data-h="420">
      A3 <span class="option-sub">297×420</span>
    </button>
    <button class="option-btn" data-size="A2" data-w="420" data-h="594">
      A2 <span class="option-sub">420×594</span>
    </button>
    <button class="option-btn" data-size="A1" data-w="594" data-h="841">
      A1 <span class="option-sub">594×841</span>
    </button>
  </div>

  <!-- STEP 3: Orientation -->
  <div class="section-label">🔄 Orientation</div>
  <div class="option-bar" id="orientationButtons">
    <button class="option-btn active" data-orient="portrait">
      <span class="orient-icon portrait-icon"></span> Portrait
    </button>
    <button class="option-btn" data-orient="landscape">
      <span class="orient-icon landscape-icon"></span> Landscape
    </button>
  </div>

  <!-- STEP 4: Room -->
  <div class="section-label">🏠 Choose a Room</div>
  <div class="template-row" id="templateGrid"></div>

  <!-- STEP 5: Frame -->
  <div class="section-label">🪞 Frame Style</div>
  <div class="option-bar" id="frameButtons">
    <button class="option-btn active" data-frame="none">
      <span class="fp fp-none"></span> None
    </button>
    <button class="option-btn" data-frame="black">
      <span class="fp fp-black"></span> Black
    </button>
    <button class="option-btn" data-frame="white">
      <span class="fp fp-white"></span> White
    </button>
    <button class="option-btn" data-frame="wood">
      <span class="fp fp-wood"></span> Wood
    </button>
  </div>

  <!-- PREVIEW -->
  <div class="section-label">👁️ Preview</div>
  <div class="card preview-card">
    <canvas id="mockupCanvas"></canvas>
    <p class="preview-hint" id="previewHint">Upload a design to see the preview</p>
  </div>

  <!-- DOWNLOAD -->
  <div class="download-row">
    <button class="download-btn" id="downloadPng">⬇️ Download PNG</button>
    <button class="download-btn secondary" id="downloadJpg">⬇️ Download JPG</button>
  </div>

  <!-- KO-FI -->
  <div class="card kofi-card">
    <p class="kofi-text">Enjoying this tool? 🎉</p>
    <a href="https://ko-fi.com/restlessrusty" target="_blank" rel="noopener" class="kofi-link">
      ☕ Buy me a coffee!
    </a>
  </div>

  <footer>Made with ❤️</footer>

</div>

<script src="js/app.js"></script>
</body>
</html>
